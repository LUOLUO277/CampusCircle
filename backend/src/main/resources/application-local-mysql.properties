spring.boot.admin.client.enabled=false

spring.datasource.url=${LOCAL_DB_URL:jdbc:mysql://localhost:3306/campus_circle?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&createDatabaseIfNotExist=true}
spring.datasource.username=${LOCAL_DB_USERNAME:root}
spring.datasource.password=${LOCAL_DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=${LOCAL_REDIS_HOST:localhost}
spring.data.redis.port=${LOCAL_REDIS_PORT:6379}
spring.data.redis.password=${LOCAL_REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

logging.file.name=./logs/campus-backend.log
upload.path=./uploads
server.url=http://localhost:8080
