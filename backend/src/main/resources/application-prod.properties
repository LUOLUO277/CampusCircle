# ????info???
management.info.env.enabled=true
management.info.build.enabled=true
management.info.git.enabled=true
management.info.java.enabled=true

spring.application.name=campus-backend
server.port=${SERVER_PORT:18082}

# ?????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/campus_circle_cy_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Redis??
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6381}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# JWT??
jwt.secret=${JWT_SECRET:change-me-in-production}
jwt.expiration-minutes=60

# ????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
upload.path=${UPLOAD_PATH:/srv/apps/cy/uploads}
server.url=${SERVER_URL:http://121.199.30.215/cy}

# Swagger??
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator??
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ????
logging.level.root=INFO
logging.level.com.campus.campus_backend=INFO
logging.file.name=${LOGGING_FILE_NAME:/srv/apps/cy/logs/campus-backend.log}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Bean??
spring.main.allow-bean-definition-overriding=true
