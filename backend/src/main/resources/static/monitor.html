<!DOCTYPE html>
<html>
<head>
    <title>Campus Backend 监控面板</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .card h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .status-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .status-up {
            color: #28a745;
            font-weight: bold;
            font-size: 1.2em;
        }
        .status-down {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.2em;
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 10px 0;
        }
        .metric-label {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }
        .chart-container {
            position: relative;
            height: 250px;
            margin-top: 15px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
        .info-item strong {
            color: #667eea;
        }
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #5568d3;
        }
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Campus Backend 监控面板</h1>

    <!-- 健康状态总览 -->
    <div class="dashboard">
        <div class="card">
            <h2>🏥 系统健康状态</h2>
            <div id="health-status">加载中...</div>
        </div>

        <div class="card">
            <h2>ℹ️ 应用信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <strong>应用名称:</strong><br>
                    <span id="app-name">Campus Circle</span>
                </div>
                <div class="info-item">
                    <strong>版本:</strong><br>
                    <span id="app-version">1.0.0</span>
                </div>
                <div class="info-item">
                    <strong>状态:</strong><br>
                    <span id="app-status" class="status-up">运行中</span>
                </div>
                <div class="info-item">
                    <strong>运行时长:</strong><br>
                    <span id="uptime">计算中...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="dashboard">
        <!-- JVM内存使用 -->
        <div class="card">
            <h2>💾 JVM内存使用</h2>
            <div id="memory-stats" class="info-grid" style="margin-bottom: 15px;">
                <div class="info-item">
                    <strong>已使用:</strong> <span id="memory-used">-</span>
                </div>
                <div class="info-item">
                    <strong>最大值:</strong> <span id="memory-max">-</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="memoryChart"></canvas>
            </div>
        </div>

        <!-- CPU使用率 -->
        <div class="card">
            <h2>⚡ CPU使用率</h2>
            <div class="metric-value" id="cpu-value">-</div>
            <div class="metric-label">当前CPU使用率</div>
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <!-- 数据库连接池 -->
        <div class="card">
            <h2>🗄️ 数据库连接池</h2>
            <div id="db-stats" class="info-grid" style="margin-bottom: 15px;">
                <div class="info-item">
                    <strong>活跃连接:</strong> <span id="db-active">-</span>
                </div>
                <div class="info-item">
                    <strong>空闲连接:</strong> <span id="db-idle">-</span>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="dbChart"></canvas>
            </div>
        </div>

        <!-- 线程数 -->
        <div class="card">
            <h2>🧵 JVM线程</h2>
            <div class="metric-value" id="thread-value">-</div>
            <div class="metric-label">当前活跃线程数</div>
            <div class="chart-container">
                <canvas id="threadChart"></canvas>
            </div>
        </div>
    </div>

    <div class="last-update">
        最后更新: <span id="last-update-time">-</span> | 自动刷新间隔: 5秒
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // 数据存储（保留历史数据用于趋势图）
    const historyData = {
        memory: [],
        cpu: [],
        threads: [],
        timestamps: []
    };

    const MAX_HISTORY = 20; // 保留最近20个数据点

    // 图表配置
    let memoryChart, cpuChart, dbChart, threadChart;

    // 初始化图表
    function initCharts() {
        // JVM内存图表（折线图）
        const memoryCtx = document.getElementById('memoryChart').getContext('2d');
        memoryChart = new Chart(memoryCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '已使用内存 (MB)',
                    data: [],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return value + ' MB';
                            }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        // CPU使用率图表（折线图）
        const cpuCtx = document.getElementById('cpuChart').getContext('2d');
        cpuChart = new Chart(cpuCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'CPU使用率 (%)',
                    data: [],
                    borderColor: '#f093fb',
                    backgroundColor: 'rgba(240, 147, 251, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            callback: function(value) {
                                return value + '%';
                            }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        // 数据库连接池图表（柱状图）
        const dbCtx = document.getElementById('dbChart').getContext('2d');
        dbChart = new Chart(dbCtx, {
            type: 'bar',
            data: {
                labels: ['活跃连接', '空闲连接', '最大连接'],
                datasets: [{
                    label: '连接数',
                    data: [0, 0, 0],
                    backgroundColor: [
                        'rgba(102, 126, 234, 0.8)',
                        'rgba(76, 175, 80, 0.8)',
                        'rgba(158, 158, 158, 0.8)'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        // 线程数图表（折线图）
        const threadCtx = document.getElementById('threadChart').getContext('2d');
        threadChart = new Chart(threadCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '线程数',
                    data: [],
                    borderColor: '#4facfe',
                    backgroundColor: 'rgba(79, 172, 254, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    }

    // 格式化字节为MB
    function formatBytes(bytes) {
        return (bytes / 1024 / 1024).toFixed(2);
    }

    // 格式化时间戳
    function formatTime() {
        const now = new Date();
        return now.toLocaleTimeString('zh-CN');
    }

    // 添加数据到历史记录
    function addToHistory(key, value) {
        historyData[key].push(value);
        if (historyData[key].length > MAX_HISTORY) {
            historyData[key].shift();
        }
    }

    // 更新时间戳
    function updateTimestamps() {
        historyData.timestamps.push(formatTime());
        if (historyData.timestamps.length > MAX_HISTORY) {
            historyData.timestamps.shift();
        }
    }

    // 获取指标值
    async function getMetric(metricName) {
        try {
            const response = await fetch(`/actuator/metrics/${metricName}`);
            const data = await response.json();
            return data.measurements[0].value;
        } catch (error) {
            console.error(`获取指标 ${metricName} 失败:`, error);
            return null;
        }
    }

    // 加载健康状态
    async function loadHealth() {
        try {
            const response = await fetch('/actuator/health');
            const data = await response.json();

            let html = `<div class="status-card">`;
            html += `<span>整体状态:</span>`;
            const status = data.status === 'UP'
                ? '<span class="status-up">✓ 运行正常</span>'
                : '<span class="status-down">✗ 异常</span>';
            html += status;
            html += `</div>`;

            if (data.components) {
                Object.keys(data.components).forEach(key => {
                    const comp = data.components[key];
                    const compStatus = comp.status === 'UP'
                        ? '<span class="status-up">UP</span>'
                        : '<span class="status-down">DOWN</span>';
                    html += `<div class="status-card">`;
                    html += `<span>${key}:</span>`;
                    html += compStatus;
                    html += `</div>`;
                });
            }

            document.getElementById('health-status').innerHTML = html;
            document.getElementById('app-status').className = data.status === 'UP' ? 'status-up' : 'status-down';
            document.getElementById('app-status').textContent = data.status === 'UP' ? '运行中' : '异常';
        } catch (error) {
            console.error('获取健康状态失败:', error);
            document.getElementById('health-status').innerHTML =
                '<div class="status-card"><span class="status-down">✗ 无法获取健康状态</span></div>';
        }
    }

    // 加载并更新所有指标
    async function loadAllMetrics() {
        updateTimestamps();

        // 1. JVM内存
        const memoryUsed = await getMetric('jvm.memory.used');
        const memoryMax = await getMetric('jvm.memory.max');

        if (memoryUsed !== null) {
            const memoryUsedMB = formatBytes(memoryUsed);
            const memoryMaxMB = memoryMax ? formatBytes(memoryMax) : 'N/A';

            document.getElementById('memory-used').textContent = memoryUsedMB + ' MB';
            document.getElementById('memory-max').textContent = memoryMaxMB + ' MB';

            addToHistory('memory', parseFloat(memoryUsedMB));

            // 更新内存图表
            memoryChart.data.labels = historyData.timestamps;
            memoryChart.data.datasets[0].data = historyData.memory;
            memoryChart.update();
        }

        // 2. CPU使用率
        const cpuUsage = await getMetric('process.cpu.usage');
        if (cpuUsage !== null) {
            const cpuPercent = (cpuUsage * 100).toFixed(2);
            document.getElementById('cpu-value').textContent = cpuPercent + '%';

            addToHistory('cpu', parseFloat(cpuPercent));

            // 更新CPU图表
            cpuChart.data.labels = historyData.timestamps;
            cpuChart.data.datasets[0].data = historyData.cpu;
            cpuChart.update();
        }

        // 3. 线程数
        const threadCount = await getMetric('jvm.threads.live');
        if (threadCount !== null) {
            document.getElementById('thread-value').textContent = Math.round(threadCount);

            addToHistory('threads', Math.round(threadCount));

            // 更新线程图表
            threadChart.data.labels = historyData.timestamps;
            threadChart.data.datasets[0].data = historyData.threads;
            threadChart.update();
        }

        // 4. 数据库连接池（HikariCP）
        const dbActive = await getMetric('hikaricp.connections.active');
        const dbIdle = await getMetric('hikaricp.connections.idle');
        const dbMax = await getMetric('hikaricp.connections.max');

        if (dbActive !== null || dbIdle !== null) {
            document.getElementById('db-active').textContent = dbActive ? Math.round(dbActive) : '0';
            document.getElementById('db-idle').textContent = dbIdle ? Math.round(dbIdle) : '0';

            // 更新数据库连接池图表
            dbChart.data.datasets[0].data = [
                dbActive ? Math.round(dbActive) : 0,
                dbIdle ? Math.round(dbIdle) : 0,
                dbMax ? Math.round(dbMax) : 10
            ];
            dbChart.update();
        }

        // 5. 更新运行时长
        const uptime = await getMetric('process.uptime');
        if (uptime !== null) {
            const hours = Math.floor(uptime / 3600);
            const minutes = Math.floor((uptime % 3600) / 60);
            document.getElementById('uptime').textContent = `${hours}小时 ${minutes}分钟`;
        }

        // 更新最后刷新时间
        document.getElementById('last-update-time').textContent = new Date().toLocaleString('zh-CN');
    }

    // 页面加载时初始化
    window.onload = function() {
        initCharts();
        loadHealth();
        loadAllMetrics();

        // 每5秒自动刷新
        setInterval(() => {
            loadHealth();
            loadAllMetrics();
        }, 5000);
    };
</script>
</body>
</html>
