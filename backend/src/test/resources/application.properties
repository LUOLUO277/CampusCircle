spring.boot.admin.client.enabled=false

# Use in-memory DB for tests to avoid locking local file DB.
spring.datasource.url=jdbc:h2:mem:campus-circle-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false

spring.data.redis.repositories.enabled=false

logging.level.root=WARN

jwt.secret=test-secret-do-not-use-in-prod
jwt.expiration-minutes=60
